<!doctype html>
<html>
  <head>
    <title>API Test</title>
  </head>
  <body>
    <h1>API Test Results</h1>
    <div id="results"></div>

    <script>
      async function testAPI() {
        const results = document.getElementById("results");
        const endpoints = [
          "/api/health",
          "/api/users",
          "/api/accounts",
          "/api/users/1",
          "/api/characters",
        ];

        for (const endpoint of endpoints) {
          try {
            const response = await fetch(endpoint);
            const contentType = response.headers.get("content-type");
            const text = await response.text();

            results.innerHTML += `
                        <div style="margin: 20px 0; padding: 10px; border: 1px solid #ccc;">
                            <h3>${endpoint}</h3>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Content-Type:</strong> ${contentType}</p>
                            <p><strong>Response Length:</strong> ${text.length}</p>
                            <p><strong>Response (first 200 chars):</strong></p>
                            <pre style="background: #f5f5f5; padding: 10px; overflow: auto;">${text.substring(0, 200)}</pre>
                            <p><strong>Valid JSON:</strong> ${isValidJSON(text) ? "Yes" : "No"}</p>
                        </div>
                    `;
          } catch (error) {
            results.innerHTML += `
                        <div style="margin: 20px 0; padding: 10px; border: 1px solid red;">
                            <h3>${endpoint}</h3>
                            <p style="color: red;"><strong>Error:</strong> ${error.message}</p>
                        </div>
                    `;
          }
        }
      }

      function isValidJSON(str) {
        try {
          JSON.parse(str);
          return true;
        } catch (e) {
          return false;
        }
      }

      // Run test when page loads
      window.onload = testAPI;
    </script>
  </body>
</html>
