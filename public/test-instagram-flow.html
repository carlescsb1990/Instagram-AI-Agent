<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Instagram Flow - Riona AI</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f5f5f5;
      }
      .test-container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .test-header {
        background: #6366f1;
        color: white;
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 15px;
      }
      .test-result {
        margin: 10px 0;
        padding: 10px;
        border-radius: 4px;
      }
      .success {
        background: #d1fae5;
        border: 1px solid #10b981;
      }
      .error {
        background: #fee2e2;
        border: 1px solid #ef4444;
      }
      .warning {
        background: #fef3cd;
        border: 1px solid #f59e0b;
      }
      .info {
        background: #dbeafe;
        border: 1px solid #3b82f6;
      }
      button {
        background: #6366f1;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin: 5px;
      }
      button:hover {
        background: #4f46e5;
      }
      .test-form {
        background: #f8fafc;
        padding: 15px;
        border-radius: 4px;
        margin: 10px 0;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border: 1px solid #d1d5db;
        border-radius: 4px;
      }
      .code-block {
        background: #1f2937;
        color: #f9fafb;
        padding: 10px;
        border-radius: 4px;
        font-family: monospace;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>🔧 Test Completo: Funcionalidad Instagram Riona AI</h1>

    <div class="test-container">
      <div class="test-header">
        <h2>1. Test de APIs Backend</h2>
      </div>
      <div id="backend-tests">
        <button onclick="testBackendEndpoints()">
          Probar Endpoints del Backend
        </button>
        <div id="backend-results"></div>
      </div>
    </div>

    <div class="test-container">
      <div class="test-header">
        <h2>2. Test de LocalStorage</h2>
      </div>
      <div id="storage-tests">
        <button onclick="testLocalStorage()">
          Probar Almacenamiento Local
        </button>
        <div id="storage-results"></div>
      </div>
    </div>

    <div class="test-container">
      <div class="test-header">
        <h2>3. Test de Formulario Agregar Cuenta</h2>
      </div>
      <div id="form-tests">
        <div class="test-form">
          <h4>Simular Agregar Cuenta Instagram:</h4>
          <input
            type="text"
            id="testUsername"
            placeholder="Usuario Instagram (ej: tu_usuario)"
            value="test_user_demo"
          />
          <input
            type="password"
            id="testPassword"
            placeholder="Contraseña"
            value="demo_password"
          />
          <input
            type="number"
            id="testLikesPerHour"
            placeholder="Likes por hora"
            value="30"
          />
          <input
            type="text"
            id="testHashtags"
            placeholder="Hashtags (separados por comas)"
            value="technology, ai, startup"
          />
          <div>
            <label
              ><input type="checkbox" id="testAutoLike" checked /> Auto
              Likes</label
            >
            <label
              ><input type="checkbox" id="testAutoComment" checked /> Auto
              Comentarios</label
            >
            <label
              ><input type="checkbox" id="testAutoFollow" /> Auto Follows</label
            >
          </div>
          <button onclick="testAddAccount()">Simular Agregar Cuenta</button>
        </div>
        <div id="form-results"></div>
      </div>
    </div>

    <div class="test-container">
      <div class="test-header">
        <h2>4. Test de Automatización</h2>
      </div>
      <div id="automation-tests">
        <button onclick="testAutomation()">
          Simular Ejecutar Automatización
        </button>
        <div id="automation-results"></div>
      </div>
    </div>

    <div class="test-container">
      <div class="test-header">
        <h2>5. Test de AI Content Generation</h2>
      </div>
      <div id="ai-tests">
        <div class="test-form">
          <input
            type="text"
            id="testContext"
            placeholder="Contexto para generar contenido"
            value="nueva tecnología de inteligencia artificial"
          />
          <select id="testPersonality">
            <option value="arcane-edge">ArcanEdge System Agent</option>
            <option value="elon">Elon Style</option>
            <option value="general">General Purpose</option>
          </select>
          <button onclick="testAIGeneration()">Probar Generación AI</button>
        </div>
        <div id="ai-results"></div>
      </div>
    </div>

    <div class="test-container">
      <div class="test-header">
        <h2>6. Estado Actual del Sistema</h2>
      </div>
      <div id="system-status">
        <button onclick="checkSystemStatus()">
          Verificar Estado del Sistema
        </button>
        <div id="status-results"></div>
      </div>
    </div>

    <script>
      let testResults = {
        backend: false,
        localStorage: false,
        formSubmission: false,
        automation: false,
        aiGeneration: false,
      };

      async function testBackendEndpoints() {
        const resultsDiv = document.getElementById("backend-results");
        resultsDiv.innerHTML = "<p>🔄 Probando endpoints...</p>";

        const endpoints = [
          "/api/health",
          "/api/users",
          "/api/accounts",
          "/api/social",
          "/api/generate",
        ];

        let results = [];

        for (const endpoint of endpoints) {
          try {
            const response = await fetch(endpoint);
            const data = await response.text();

            results.push(`
                        <div class="test-result ${response.ok ? "success" : "error"}">
                            <strong>${endpoint}</strong>: ${response.status} ${response.statusText}
                            <br>Response length: ${data.length} chars
                            ${data.length < 500 ? '<div class="code-block">' + data.substring(0, 200) + "...</div>" : ""}
                        </div>
                    `);

            if (response.ok) testResults.backend = true;
          } catch (error) {
            results.push(`
                        <div class="test-result error">
                            <strong>${endpoint}</strong>: Error - ${error.message}
                        </div>
                    `);
          }
        }

        resultsDiv.innerHTML = results.join("");
      }

      function testLocalStorage() {
        const resultsDiv = document.getElementById("storage-results");
        let results = [];

        try {
          // Test basic localStorage functionality
          const testData = { test: "data", timestamp: Date.now() };
          localStorage.setItem("riona_test", JSON.stringify(testData));
          const retrieved = JSON.parse(localStorage.getItem("riona_test"));

          if (retrieved && retrieved.test === "data") {
            results.push(
              '<div class="test-result success">✅ localStorage funcionando correctamente</div>',
            );
            testResults.localStorage = true;
          } else {
            results.push(
              '<div class="test-result error">❌ Error en localStorage</div>',
            );
          }

          // Test existing data
          const existingUsers = localStorage.getItem("riona_users");
          const existingAccounts = localStorage.getItem("riona_accounts");

          results.push(
            `<div class="test-result info">📊 Usuarios almacenados: ${existingUsers ? JSON.parse(existingUsers).length : 0}</div>`,
          );
          results.push(
            `<div class="test-result info">📊 Cuentas almacenadas: ${existingAccounts ? JSON.parse(existingAccounts).length : 0}</div>`,
          );

          // Clean up
          localStorage.removeItem("riona_test");
        } catch (error) {
          results.push(
            `<div class="test-result error">❌ Error: ${error.message}</div>`,
          );
        }

        resultsDiv.innerHTML = results.join("");
      }

      function testAddAccount() {
        const resultsDiv = document.getElementById("form-results");

        try {
          const accountData = {
            id: Date.now(),
            username: document.getElementById("testUsername").value,
            password: document.getElementById("testPassword").value,
            platform: "instagram",
            status: "active",
            created: new Date().toISOString(),
            settings: {
              autoLike: document.getElementById("testAutoLike").checked,
              autoComment: document.getElementById("testAutoComment").checked,
              autoFollow: document.getElementById("testAutoFollow").checked,
              maxLikesPerHour: parseInt(
                document.getElementById("testLikesPerHour").value,
              ),
              targetHashtags: document
                .getElementById("testHashtags")
                .value.split(",")
                .map((h) => h.trim()),
            },
            stats: {
              followers: Math.floor(Math.random() * 5000) + 1000,
              following: Math.floor(Math.random() * 2000) + 500,
              engagement: (Math.random() * 5 + 3).toFixed(1),
            },
          };

          // Save to localStorage
          const accounts = JSON.parse(
            localStorage.getItem("riona_accounts") || "[]",
          );
          accounts.push(accountData);
          localStorage.setItem("riona_accounts", JSON.stringify(accounts));

          resultsDiv.innerHTML = `
                    <div class="test-result success">
                        ✅ Cuenta agregada exitosamente
                        <div class="code-block">${JSON.stringify(accountData, null, 2)}</div>
                    </div>
                `;

          testResults.formSubmission = true;
        } catch (error) {
          resultsDiv.innerHTML = `<div class="test-result error">❌ Error: ${error.message}</div>`;
        }
      }

      async function testAutomation() {
        const resultsDiv = document.getElementById("automation-results");
        resultsDiv.innerHTML = "<p>🔄 Simulando automatización...</p>";

        try {
          // Simulate automation process
          const accounts = JSON.parse(
            localStorage.getItem("riona_accounts") || "[]",
          );

          if (accounts.length === 0) {
            resultsDiv.innerHTML =
              '<div class="test-result warning">⚠️ No hay cuentas para automatizar. Agrega una cuenta primero.</div>';
            return;
          }

          const account = accounts[0];
          const actions = [];

          // Simulate different actions
          const likesCount =
            Math.floor(Math.random() * account.settings.maxLikesPerHour) + 1;
          const commentsCount = Math.floor(likesCount * 0.3);
          const followsCount = Math.floor(likesCount * 0.2);

          actions.push(
            `❤️ ${likesCount} likes dados en hashtags: ${account.settings.targetHashtags.join(", ")}`,
          );

          if (account.settings.autoComment) {
            actions.push(`💬 ${commentsCount} comentarios AI generados`);
          }

          if (account.settings.autoFollow) {
            actions.push(`👥 ${followsCount} nuevas cuentas seguidas`);
          }

          // Update analytics
          const analytics = JSON.parse(
            localStorage.getItem("riona_analyticsData") ||
              '{"totalLikes": 0, "totalComments": 0, "totalFollows": 0}',
          );
          analytics.totalLikes = (analytics.totalLikes || 0) + likesCount;
          analytics.totalComments =
            (analytics.totalComments || 0) + commentsCount;
          analytics.totalFollows = (analytics.totalFollows || 0) + followsCount;
          localStorage.setItem(
            "riona_analyticsData",
            JSON.stringify(analytics),
          );

          setTimeout(() => {
            resultsDiv.innerHTML = `
                        <div class="test-result success">
                            ✅ Automatización simulada completada para @${account.username}
                            <ul>
                                ${actions.map((action) => `<li>${action}</li>`).join("")}
                            </ul>
                            <div class="code-block">Analytics actualizados: ${JSON.stringify(analytics, null, 2)}</div>
                        </div>
                    `;
            testResults.automation = true;
          }, 2000);
        } catch (error) {
          resultsDiv.innerHTML = `<div class="test-result error">❌ Error: ${error.message}</div>`;
        }
      }

      async function testAIGeneration() {
        const resultsDiv = document.getElementById("ai-results");
        resultsDiv.innerHTML = "<p>🔄 Generando contenido con AI...</p>";

        const context = document.getElementById("testContext").value;
        const personality = document.getElementById("testPersonality").value;

        try {
          // Try API first
          const response = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              type: "comment",
              context: context,
              character: personality,
            }),
          });

          let content;
          if (response.ok) {
            const data = await response.json();
            content = data.data?.content || "Contenido generado por API";
          } else {
            // Fallback to mock generation
            const mockComments = {
              "arcane-edge": `🚀 Increíble innovación en ${context}! Este avance podría revolucionar completamente la industria. La convergencia de tecnologías emergentes está creando oportunidades sin precedentes.`,
              elon: `El futuro es ahora. ${context} cambiará todo lo que conocemos. Mars next! 🔴 La humanidad está destinada a ser una especie multiplanetaria.`,
              general: `¡Excelente contenido sobre ${context}! Me encanta cómo la tecnología continúa evolucionando. Definitivamente seguiré de cerca estos desarrollos. 👏`,
            };
            content = mockComments[personality] || mockComments["general"];
          }

          resultsDiv.innerHTML = `
                    <div class="test-result success">
                        ✅ Contenido AI generado exitosamente
                        <br><strong>Personalidad:</strong> ${personality}
                        <br><strong>Contexto:</strong> ${context}
                        <div class="code-block">${content}</div>
                    </div>
                `;

          testResults.aiGeneration = true;
        } catch (error) {
          resultsDiv.innerHTML = `<div class="test-result error">❌ Error: ${error.message}</div>`;
        }
      }

      function checkSystemStatus() {
        const resultsDiv = document.getElementById("status-results");

        const status = {
          backend: testResults.backend
            ? "✅ Funcionando"
            : "❌ Problemas detectados",
          localStorage: testResults.localStorage
            ? "✅ Funcionando"
            : "❌ Problemas detectados",
          formSubmission: testResults.formSubmission
            ? "✅ Funcionando"
            : "⚠️ No probado",
          automation: testResults.automation
            ? "✅ Funcionando"
            : "⚠️ No probado",
          aiGeneration: testResults.aiGeneration
            ? "✅ Funcionando"
            : "⚠️ No probado",
        };

        const accounts = JSON.parse(
          localStorage.getItem("riona_accounts") || "[]",
        );
        const analytics = JSON.parse(
          localStorage.getItem("riona_analyticsData") || "{}",
        );

        resultsDiv.innerHTML = `
                <div class="test-result info">
                    <h4>🔍 Estado del Sistema:</h4>
                    <ul>
                        <li><strong>Backend APIs:</strong> ${status.backend}</li>
                        <li><strong>LocalStorage:</strong> ${status.localStorage}</li>
                        <li><strong>Formularios:</strong> ${status.formSubmission}</li>
                        <li><strong>Automatización:</strong> ${status.automation}</li>
                        <li><strong>AI Generation:</strong> ${status.aiGeneration}</li>
                    </ul>
                    
                    <h4>📊 Datos Actuales:</h4>
                    <ul>
                        <li><strong>Cuentas Instagram:</strong> ${accounts.length}</li>
                        <li><strong>Likes totales:</strong> ${analytics.totalLikes || 0}</li>
                        <li><strong>Comentarios:</strong> ${analytics.totalComments || 0}</li>
                        <li><strong>Follows:</strong> ${analytics.totalFollows || 0}</li>
                    </ul>
                    
                    <h4>🎯 Recomendaciones:</h4>
                    <ul>
                        ${!testResults.backend ? "<li>❗ Verificar que el servidor backend esté ejecutándose</li>" : ""}
                        ${!testResults.localStorage ? "<li>❗ Verificar permisos de localStorage en el navegador</li>" : ""}
                        ${accounts.length === 0 ? "<li>💡 Agregar al menos una cuenta de Instagram para probar</li>" : ""}
                        <li>✅ El sistema está ${Object.values(testResults).filter(Boolean).length >= 3 ? "mayormente funcional" : "parcialmente funcional"}</li>
                    </ul>
                </div>
            `;
      }

      // Run initial tests
      document.addEventListener("DOMContentLoaded", () => {
        console.log(
          "🔧 Página de test cargada. Ejecutando pruebas automáticas...",
        );
        setTimeout(() => {
          testLocalStorage();
          checkSystemStatus();
        }, 1000);
      });
    </script>
  </body>
</html>
