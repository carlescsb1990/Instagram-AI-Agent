<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug API Calls</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .test-result {
        margin: 20px 0;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      .success {
        border-color: green;
        background: #f0fff0;
      }
      .error {
        border-color: red;
        background: #fff0f0;
      }
      pre {
        background: #f5f5f5;
        padding: 10px;
        overflow: auto;
      }
      button {
        margin: 5px;
        padding: 10px 20px;
      }
    </style>
  </head>
  <body>
    <h1>🔧 Debug API Calls</h1>

    <div>
      <button onclick="testEndpoint('/api/test')">Test Simple Endpoint</button>
      <button onclick="testEndpoint('/api/users')">Test Users</button>
      <button onclick="testEndpoint('/api/accounts')">Test Accounts</button>
      <button onclick="testEndpoint('/api/health')">Test Health</button>
      <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="results"></div>

    <script>
      async function testEndpoint(endpoint) {
        const resultsDiv = document.getElementById("results");
        const startTime = Date.now();

        try {
          console.log(`Testing ${endpoint}...`);

          const response = await fetch(endpoint);
          const contentType = response.headers.get("content-type");

          console.log(`Response status: ${response.status}`);
          console.log(`Content-Type: ${contentType}`);

          const text = await response.text();
          console.log(`Response length: ${text.length}`);
          console.log(`Response text: ${text.substring(0, 100)}...`);

          let parsed;
          try {
            parsed = JSON.parse(text);
          } catch (parseError) {
            throw new Error(`JSON Parse Error: ${parseError.message}`);
          }

          const duration = Date.now() - startTime;

          resultsDiv.innerHTML += `
                    <div class="test-result success">
                        <h3>✅ ${endpoint} - SUCCESS (${duration}ms)</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Content-Type:</strong> ${contentType}</p>
                        <p><strong>Response Length:</strong> ${text.length} characters</p>
                        <p><strong>Parsed JSON:</strong></p>
                        <pre>${JSON.stringify(parsed, null, 2)}</pre>
                    </div>
                `;
        } catch (error) {
          const duration = Date.now() - startTime;
          console.error(`Error testing ${endpoint}:`, error);

          resultsDiv.innerHTML += `
                    <div class="test-result error">
                        <h3>❌ ${endpoint} - ERROR (${duration}ms)</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Error Type:</strong> ${error.constructor.name}</p>
                        <pre>${error.stack || "No stack trace available"}</pre>
                    </div>
                `;
        }
      }

      function clearResults() {
        document.getElementById("results").innerHTML = "";
      }

      // Test basic functionality on load
      window.onload = function () {
        console.log("Debug page loaded");
        setTimeout(() => testEndpoint("/api/test"), 1000);
      };
    </script>
  </body>
</html>
