<!doctype html>
<html>
  <head>
    <title>JSON Response Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .test {
        margin: 20px 0;
        padding: 15px;
        border-radius: 5px;
      }
      .success {
        background: #e8f5e8;
        border: 1px solid #4caf50;
      }
      .error {
        background: #ffeaea;
        border: 1px solid #f44336;
      }
      pre {
        background: #f5f5f5;
        padding: 10px;
        overflow: auto;
      }
      .char-info {
        font-family: monospace;
        background: #fff3cd;
        padding: 10px;
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <h1>🧪 JSON Response Integrity Test</h1>
    <div id="results"></div>

    <script>
      async function testJSONIntegrity() {
        const endpoints = [
          "/api/test",
          "/api/users",
          "/api/accounts",
          "/api/health",
        ];
        const results = document.getElementById("results");

        for (const endpoint of endpoints) {
          try {
            const response = await fetch(endpoint);
            const text = await response.text();

            // Character analysis
            const charAnalysis = analyzeResponseText(text);

            try {
              const parsed = JSON.parse(text);

              results.innerHTML += `
                            <div class="test success">
                                <h3>✅ ${endpoint} - SUCCESS</h3>
                                <p><strong>Response Length:</strong> ${text.length} characters</p>
                                <div class="char-info">
                                    <strong>Character Analysis:</strong><br>
                                    First char: '${text[0]}' (${text.charCodeAt(0)})<br>
                                    Last char: '${text[text.length - 1]}' (${text.charCodeAt(text.length - 1)})<br>
                                    ${charAnalysis}
                                </div>
                                <pre>${JSON.stringify(parsed, null, 2)}</pre>
                            </div>
                        `;
            } catch (parseError) {
              results.innerHTML += `
                            <div class="test error">
                                <h3>❌ ${endpoint} - JSON PARSE ERROR</h3>
                                <p><strong>Error:</strong> ${parseError.message}</p>
                                <p><strong>Response Length:</strong> ${text.length} characters</p>
                                <div class="char-info">
                                    <strong>Character Analysis:</strong><br>
                                    ${charAnalysis}
                                </div>
                                <p><strong>Raw Response:</strong></p>
                                <pre>${text}</pre>
                                <p><strong>Character Codes:</strong></p>
                                <pre>${Array.from(text)
                                  .map(
                                    (c, i) =>
                                      `${i}: '${c}' (${c.charCodeAt(0)})`,
                                  )
                                  .join("\\n")}</pre>
                            </div>
                        `;
            }
          } catch (fetchError) {
            results.innerHTML += `
                        <div class="test error">
                            <h3>❌ ${endpoint} - FETCH ERROR</h3>
                            <p><strong>Error:</strong> ${fetchError.message}</p>
                        </div>
                    `;
          }
        }
      }

      function analyzeResponseText(text) {
        const lines = text.split("\\n");
        const hasNewlines = lines.length > 1;
        const hasExtraContent = text.match(/\\}\\s*\\S/);
        const endsCleanly =
          text.trim().endsWith("}") || text.trim().endsWith("]");

        return `
                Lines: ${lines.length}<br>
                Has newlines: ${hasNewlines}<br>
                Ends cleanly: ${endsCleanly}<br>
                Has extra content after JSON: ${!!hasExtraContent}<br>
                Trimmed length: ${text.trim().length}
            `;
      }

      // Run test on load
      window.onload = testJSONIntegrity;
    </script>
  </body>
</html>
